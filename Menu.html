<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0" />
    <title>Main Menu ❤️</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Quicksand&family=Limelight&family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="FrontStyle.css">
</head>
<body>
    <!-- Floating Hearts -->
    <div class="hearts" id="hearts"></div>
    <!-- Note Bar -->
    <div class="note-bar">
        <div class="scroll-text">
            <span class="note-name"> Note for the day —</span> <span id="dailyNote"></span>
        </div>
    </div>
        <!-- Main Menu -->
        <div class="main">
            <div class="nav">

            <!-- Memories -->
            <button class="nav-btn" onclick="window.location.href='Menu/Memories/Memories.html'">
        <i class="fa-solid fa-folder-open"></i>
        <span>Best of Memories</span>
        </button>

        <!-- Music -->
        <button class="nav-btn"
        onclick="window.location.href='Menu/Music/Music.html'">
        <i class="fa-solid fa-music"></i>
        <span>Favourite Music</span>
        </button>

        <!-- Countdown -->
        <button class="nav-btn"
        onclick="window.location.href='Menu/Countdown/Countdown.html'">
        <i class="fa-solid fa-cake-candles"></i>
        <span>Special Countdown</span>
        </button>

        <!-- About -->
        <button class="nav-btn"
        onclick="window.location.href='Menu/About.html'">
        <i class="fa-solid fa-heart"></i>
        <span>About Saini</span>
        </button>

    </div>
</div>

    <!-- Footer -->
    <div class="global-footer">
    © 2026 • Crafted with love by Jit Hazra 💖
    </div>

    <!-- Scripts -->
    <script src="DailyNotes.js"></script>
    <script src="FrontScript.js"></script>

</body>
</html>
