<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Quicksand&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel = "stylesheet" href = "FrontStyle.css">
  <title>For My Love ❤️</title>
</head>
<body>
<div class="hearts" id="hearts"></div>

<!-- Welcome Popup -->
<div class="popup" id="welcome">
  <h1>Welcome to a soft little world of love and memories for Saini Paul 🌸💖</h1>

  <p>Are you ready to step in?</p>

  <button onclick="checkBirthday()">Begin The Journey</button>
</div>

<!-- Birthday Popup -->
<div class="popup hidden" id="birthday">

  <!-- Random photo area -->
  <div class="birthday-photo">
    <img id="birthdayImg" src="" alt="Saini Paul ❤️">
  </div>

  <h1>🎉 Wishing you a very happy birthday, my love.. 🎂</h1>

  <!-- Your message section -->
  <div class="birthday-message" id="birthdayMessage">
    <p>You are the most special person in my life ❤️</p>
  </div>

  <button onclick="showMain()">Continue</button>
</div>

<!-- Main Website -->
<div class="main hidden" id="main">
  <h1>Hi My Love ❤️</h1>
  <p>This website is a small piece of my heart.</p>

  <div class="nav">
    <button>Memories</button>
    <button>Music</button>
    <button>About Her</button>
    <button>Love Letters</button>
  </div>
</div>

<script src="FrontScript.js"></script>
</body>
</html>
