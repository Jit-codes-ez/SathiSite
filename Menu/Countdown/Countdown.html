<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">
  <title>Special Countdowns ❤️</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Lobster&family=Quicksand&family=Great+Vibes&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- CSS -->
  <link rel="stylesheet" href="../../FrontStyle.css">
  <link rel="stylesheet" href="Countdown.css">
</head>

<body>
  <!-- Floating Hearts -->
  <div class="hearts" id="hearts"></div>
  <!-- Header -->
  <div class="memory-header">
    <h1 class="memory-title">
      Special Countdowns
    </h1>
  </div>

  <!-- Main Card -->
  <div class="popup countdown-card">

    <h1>Special Countdowns ❤️</h1>

    <p class="countdown-text">
      Counting beautiful moments together ✨
    </p>

    <!-- Birthday Countdown -->
    <div class="countdown-section">

      <h2 class="countdown-title">
        Next Birthday 🎂
      </h2>

      <div class="countdown-container">

        <div class="time-box">
          <span id="birthdayDays">00</span>
          <small>Days</small>
        </div>

        <div class="time-box">
          <span id="birthdayHours">00</span>
          <small>Hours</small>
        </div>

        <div class="time-box">
          <span id="birthdayMinutes">00</span>
          <small>Minutes</small>
        </div>

        <div class="time-box">
          <span id="birthdaySeconds">00</span>
          <small>Seconds</small>
        </div>

      </div>

    </div>

    <!-- Anniversary Countdown -->
    <div class="countdown-section">

      <h2 class="countdown-title">
        Next Anniversary 💖
      </h2>

      <div class="countdown-container">

        <div class="time-box">
          <span id="anniversaryDays">00</span>
          <small>Days</small>
        </div>

        <div class="time-box">
          <span id="anniversaryHours">00</span>
          <small>Hours</small>
        </div>

        <div class="time-box">
          <span id="anniversaryMinutes">00</span>
          <small>Minutes</small>
        </div>
        <div class="time-box">
          <span id="anniversarySeconds">00</span>
          <small>Seconds</small>
        </div>
      </div>
    </div>
<br>
<br>
    <!-- Back Button -->
    <button class="back-btn"
      onclick="window.location.href='../../Menu.html'">
      <i class="fa-solid fa-arrow-left"></i>
      Back To Home
    </button>
  </div>
    <div class="global-footer">
    © 2026 • Crafted with love by Jit Hazra 💖
  </div>
  <!-- Scripts -->
   <script src="../Memories/Memories.css"></script>
  <script src="../../FrontScript.js"></script>
  <script src="Countdown.js"></script>

</body>
</html>
