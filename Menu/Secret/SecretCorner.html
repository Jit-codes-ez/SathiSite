<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">
  <title>Secret Corner</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Lobster&family=Cookie&family=Great+Vibes&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- CSS -->
  <link rel="stylesheet" href="../../FrontStyle.css">
  <link rel="stylesheet" href="SecretCorner.css">
</head>

<body>
  <!-- Floating Hearts -->
  <div class="hearts" id="hearts"></div>

  <!-- Header -->
  <div class="memory-header">
    <h1 class="memory-title">
      Secret Corner
    </h1>
  </div>
  <!-- 🔐 LOCK SCREEN (UI) -->
  <div id="lock-screen" class="lock-screen">
    <div class="lock-box">
      <h2>To Access Secret Corner </h2>
      <div class="password-box">

  <input
    type="password"
    id="secretInput"
    placeholder="Enter password to continue.." />

  <i class="fa-solid fa-eye"
     id="togglePassword"
     onclick="togglePassword()"></i>

</div>
      
      <button onclick="checkPassword()">Unlock</button>

      <p id="error"></p>
    </div>
  </div>

  <!-- 💖 CONTENT -->
  <div id="content" class="content">
    <h1>Welcome Saini ❤️</h1>

    <p>
      This corner belongs only to you 🌸<br><br>
      Every memory is safe here.
    </p>

    <button onclick="window.location.href='../../Menu.html'">
      Back To Home
    </button>
  </div>
  <div class="global-footer">
    © 2026 • Crafted with love by Jit Hazra 💖
  </div>

  <script src="SecretCorner.js"></script>
</body>
</html>
